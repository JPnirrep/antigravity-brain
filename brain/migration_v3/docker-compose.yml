version: '3.8'

services:
  traefik:
    image: traefik:v2.10
    container_name: traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${USER_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    restart: unless-stopped

  brain-bot:
    build:
      context: ./antigravity_cloud
      dockerfile: Dockerfile
    container_name: antigravity-brain
    env_file: .env
    depends_on:
      - mongo
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.brain.rule=Host(`bot.${DOMAIN}`)"
      - "traefik.http.routers.brain.entrypoints=websecure"
      - "traefik.http.routers.brain.tls.certresolver=myresolver"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  mongo:
    image: mongo:6.0
    container_name: mongodb
    volumes:
      - "./data/db:/data/db"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  affine:
    image: ghcr.io/toeverything/affine-graphql:latest
    container_name: affine
    environment:
      - NODE_ENV=production
    volumes:
      - "./data/affine:/root/.affine"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.affine.rule=Host(`wiki.${DOMAIN}`)"
      - "traefik.http.routers.affine.entrypoints=websecure"
      - "traefik.http.routers.affine.tls.certresolver=myresolver"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
